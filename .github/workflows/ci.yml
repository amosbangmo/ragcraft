name: CI

on:
  push:
  pull_request:

jobs:
  lint-test-boot:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ci-test-key
      RAGCRAFT_JWT_SECRET: ci-jwt-secret-at-least-32-characters-long!!
      PYTHONPATH: api/src:frontend/src:api/tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies (Cypress)
        run: npm ci

      - name: Lint (critical rules)
        run: ruff check . --select E9,F63,F7,F82

      - name: Lint (project rules — same as scripts/lint.sh)
        run: bash scripts/lint.sh

      - name: Architecture tests — same as scripts/validate_architecture.sh
        run: bash scripts/validate_architecture.sh

      - name: Pytest (remainder — same as step 2 of scripts/run_tests.sh)
        run: python -m pytest api/tests --ignore=api/tests/architecture --ignore=api/tests/bootstrap frontend/tests -q --tb=short

      - name: Cypress E2E (live API)
        run: npm run cy:ci

      - name: Coverage report (application + domain)
        run: |
          python -m pytest api/tests/appli api/tests/domain --cov=application --cov=domain --cov-report=term-missing:skip-covered --cov-report=xml:coverage.xml -q --tb=no

      - name: Run backend runtime tests
        run: python -m unittest discover -s api/tests/infra -p "test_*.py"

      - name: Run integration tests
        run: python -m unittest discover -s api/tests/appli/_unclassified_tests/integration -p "test_*.py"

      - name: Run quality gates
        run: python -m unittest discover -s api/tests/appli/_unclassified_tests/quality -p "test_*.py"

      - name: Basic app boot check
        run: |
          python -c "from interfaces.http.main import create_app; create_app(); print('boot-ok')"
