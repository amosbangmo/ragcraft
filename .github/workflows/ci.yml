name: CI

on:
  push:
  pull_request:

jobs:
  lint-test-boot:
    runs-on: ubuntu-latest

      OPENAI_API_KEY: ci-test-key
      RAGCRAFT_JWT_SECRET: ci-jwt-secret-at-least-32-characters-long!!
      PYTHONPATH: api/src:frontend/src:api/tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (critical rules)
        run: ruff check . --select E9,F63,F7,F82

      - name: Lint (project Ruff rules, api + frontend + architecture tests)
        run: ruff check api/src frontend/src api/tests/architecture

      - name: Architecture tests (pytest)
        run: pytest api/tests/architecture -q --tb=short

      - name: Run backend runtime tests
        run: python -m unittest discover -s api/tests/infrastructure_tests -p "test_*.py"

      - name: Run integration tests
        run: python -m unittest discover -s api/tests/application_tests/_unclassified_tests/integration -p "test_*.py"

      - name: Run quality gates
        run: python -m unittest discover -s api/tests/application_tests/_unclassified_tests/quality -p "test_*.py"

      - name: Basic app boot check
        run: |
          python -c "from services.streamlit_backend_factory import build_streamlit_backend_application_container; build_streamlit_backend_application_container(); print('boot-ok')"
